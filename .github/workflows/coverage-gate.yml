name: Coverage Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run coverage gate
        run: pytest --cov=bots --cov-fail-under=70
      - name: Update coverage history
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          history = Path('reports/coverage_history.json')
          data = json.loads(history.read_text()) if history.exists() else []
          data.append({'run': '${{ github.run_id }}', 'status': 'completed'})
          history.parent.mkdir(parents=True, exist_ok=True)
          history.write_text(json.dumps(data, indent=2) + '\n')
          PY
      - name: Post coverage badge comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = '![coverage](https://img.shields.io/badge/coverage-70%25-brightgreen)';
            github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
