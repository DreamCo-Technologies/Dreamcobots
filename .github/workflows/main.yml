name: DreamCoOS Main Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate runtime, framework, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm ci

      - name: Run framework compliance gate
        run: python3 tools/check_bot_framework.py

      - name: Run Python validation suite
        run: python -m pytest tests/test_python_bot_orchestrator.py tests/test_dreamco_orchestrator.py -q

      - name: Run JavaScript tests
        run: npm run test -- --passWithNoTests
