name: Dependency Foundation

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  matrix-validation:
    name: Matrix validate (${{ matrix.os }} / py${{ matrix.python-version }} / node${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
        node-version: ["20"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm ci

      - name: Hermetic and policy checks
        run: |
          python tools/check_env_lock_consistency.py --python-version 3.11 --node-version 20
          python tools/check_dependency_policy.py

      - name: Profile dry-run checks
        run: |
          python tools/install_repo_dependencies.py --profile minimal --dry-run --validate-checksums --telemetry-path artifacts/dependency/profile_minimal_${{ matrix.os }}_${{ matrix.python-version }}.json
          python tools/install_repo_dependencies.py --profile core-ai --dry-run --validate-checksums --telemetry-path artifacts/dependency/profile_core_ai_${{ matrix.os }}_${{ matrix.python-version }}.json
          python tools/install_repo_dependencies.py --profile frontend --dry-run --validate-checksums --telemetry-path artifacts/dependency/profile_frontend_${{ matrix.os }}_${{ matrix.python-version }}.json

      - name: Generate dependency graph
        run: |
          python tools/dependency_graph.py \
            --json-out artifacts/dependency/dependency_graph_${{ matrix.os }}_${{ matrix.python-version }}.json \
            --markdown-out artifacts/dependency/dependency_graph_${{ matrix.os }}_${{ matrix.python-version }}.md \
            --graph-out artifacts/dependency/dependency_graph_${{ matrix.os }}_${{ matrix.python-version }}.dot

      - name: Upload dependency artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-foundation-${{ matrix.os }}-py${{ matrix.python-version }}
          path: artifacts/dependency/*

  container-smoke:
    name: Container smoke validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build root container image
        run: docker build -t dreamcobots-foundation:ci .
