              with open(schema_path, 'r') as f:
                  if 'DreamCodeLab' in f.read():
                      results["details"].append("DreamCodeLab division found in schema")
                      results["score"] += 50
          
          results["score"] += min(lab_bots * 10, 50)
          
          with open('code-lab.json', 'w') as f:
