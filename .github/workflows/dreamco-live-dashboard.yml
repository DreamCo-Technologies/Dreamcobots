          with open('core-test-suite.json', 'w') as f:
              json.dump(results, f)
        shell: python
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-test-suite
          path: core-test-suite.json

  master-dashboard-report:
    runs-on: ubuntu-latest
    needs: [fleet-scan, buddy-deep-test, global-ai-sources, deal-analyzer, formula-vault, code-lab, autonomy-modes, ai-ecosystem, marketplace, connections, crypto, payments, biz-launch, debug-intel, revenue-tracking, cost-tracking, learning-matrix, ai-models-hub, ai-leaders, orchestration, time-capsule, pricing, era-testing, core-test-suite]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate Master Dashboard
        run: |
          import os, json, time
          
          all_results = []
          for root, dirs, files in os.walk('artifacts'):
              for file in files:
                  if file.endswith('.json'):
                      with open(os.path.join(root, file), 'r') as f:
                          all_results.append(json.load(f))
          
          total_score = sum(r['score'] for r in all_results)
          avg_score = total_score / len(all_results) if all_results else 0
          
          html = "<!DOCTYPE html><html><head><title>DreamCo Master Dashboard</title>"
          html += "<style>body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 2rem; }"
          html += ".header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }"
          html += ".score-card { background: #1e293b; padding: 1.5rem; border-radius: 0.5rem; text-align: center; }"
          html += ".grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }"
          html += ".module-card { background: #1e293b; padding: 1rem; border-radius: 0.5rem; border-left: 4px solid; }"
          html += ".pass { border-left-color: #22c55e; } .fail { border-left-color: #ef4444; }"
          html += "</style></head><body>"
          
          html += "<div class='header'><h1>DreamCo Empire OS Dashboard</h1>"
          html += "<div class='score-card'><h2>Overall Health</h2><div style='font-size:3rem;font-weight:bold;'>" + str(round(avg_score, 1)) + "%</div></div></div>"
          
          html += "<div class='grid'>"
          for r in all_results:
              status_class = "pass" if r['status'] == "pass" else "fail"
              html += "<div class='module-card " + status_class + "'>"
              html += "<h3>" + r['module'] + "</h3>"
              html += "<p>Status: " + r['status'].upper() + "</p>"
              html += "<p>Score: " + str(r['score']) + "/100</p>"
              html += "<ul>"
              for d in r['details']:
                  html += "<li>" + d + "</li>"
              html += "</ul></div>"
          html += "</div></body></html>"
          
          with open('dashboard.html', 'w') as f:
              f.write(html)
              
          report = {
              "total_modules": len(all_results),
              "average_score": avg_score,
              "results": all_results,
              "timestamp": time.time()
          }
          with open('master-report.json', 'w') as f:
              json.dump(report, f)
        shell: python
      - name: Upload Master Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: dreamco-master-dashboard
          path: |
            dashboard.html
            master-report.json
