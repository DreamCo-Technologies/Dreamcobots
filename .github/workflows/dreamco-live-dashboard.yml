name: DreamCo Live Dashboard

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to test (all or specific name)'
        required: true
        default: 'all'
  push:
    branches:
      - main
    paths:
      - 'bots/**'
      - 'shared/**'
  schedule:
    - cron: '0 6 * * *'

jobs:
  fleet-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fleet Scan
        run: |
          import os, json, time
          results = {
              "module": "fleet-scan",
              "status": "pass",
              "score": 0,
              "details": [],
              "timestamp": time.time()
          }
          bots_dir = 'bots'
          if os.path.exists(bots_dir):
              bots = [f for f in os.listdir(bots_dir) if os.path.isfile(os.path.join(bots_dir, f))]
              results["details"].append("Found " + str(len(bots)) + " bots in bots/ directory")
              results["score"] += min(len(bots) * 10, 50)
          else:
              results["details"].append("bots/ directory not found")
              results["status"] = "fail"
          
          # Check profiles in seed files as a proxy for 'count profiles'
          profile_count = 0
          for root, dirs, files in os.walk('server'):
              for file in files:
                  if file.startswith('seed-') and file.endswith('.ts'):
                      with open(os.path.join(root, file), 'r') as f:
                          profile_count += f.read().count('insertBotProfileSchema')
          results["details"].append("Estimated " + str(profile_count) + " bot profiles in seed files")
          results["score"] += min(profile_count, 50)
          
          with open('fleet-scan.json', 'w') as f:
              json.dump(results, f)
        shell: python
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fleet-scan
          path: fleet-scan.json

  buddy-deep-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Buddy Deep Test
        run: |
          import os, json, time
          results = {"module": "buddy-deep-test", "status": "pass", "score": 0, "details": [], "timestamp": time.time()}
          
          # Check for buddy-bot in seed files
          found_buddy = False
          correct_division = False
          has_keywords = False
          
          seed_files = ['server/seed-buddy-bot.ts', 'server/seed-bots.ts']
          for sf in seed_files:
              if os.path.exists(sf):
                  with open(sf, 'r') as f:
                      content = f.read()
                      if 'buddy-bot' in content:
                          found_buddy = True
                          if 'CommandCore' in content:
                              correct_division = True
                          if 'protocol' in content.lower() or 'BUDDY_BOT_PROTOCOL' in content:
                              has_keywords = True
          
          if found_buddy:
              results["details"].append("Found buddy-bot slug")
              results["score"] += 40
          if correct_division:
              results["details"].append("Correct division: CommandCore")
              results["score"] += 30
          if has_keywords:
              results["details"].append("Protocol keywords found")
              results["score"] += 30
          
          if not found_buddy:
              results["status"] = "fail"
          
          with open('buddy-deep-test.json', 'w') as f:
              json.dump(results, f)
        shell: python
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: buddy-deep-test
          path: buddy-deep-test.json

