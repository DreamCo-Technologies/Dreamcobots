name: Max Parallel Delivery Control

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"
    - cron: "0 15 * * 1"

permissions:
  contents: read
  actions: write

jobs:
  deadline-gate:
    name: Deadline gate (June 22)
    runs-on: ubuntu-latest
    outputs:
      can_run: ${{ steps.deadline.outputs.can_run }}
      is_monday: ${{ steps.deadline.outputs.is_monday }}
    steps:
      - name: Enforce June 22 deadline
        id: deadline
        run: |
          TODAY="$(date -u +%F)"
          DEADLINE="2026-06-22"
          DAY_OF_WEEK="$(date -u +%u)"
          if [ "$TODAY" \> "$DEADLINE" ]; then
            echo "can_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "can_run=true" >> "$GITHUB_OUTPUT"
          fi
          if [ "$DAY_OF_WEEK" = "1" ]; then
            echo "is_monday=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_monday=false" >> "$GITHUB_OUTPUT"
          fi
          echo "today=$TODAY deadline=$DEADLINE day_of_week=$DAY_OF_WEEK"

  daily-validate:
    name: Daily plan/build/validate/merge cadence
    runs-on: ubuntu-latest
    needs: deadline-gate
    if: ${{ needs.deadline-gate.outputs.can_run == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm ci

      - name: Validate fast checks
        run: |
          python -m pytest tests/test_company_lookup_bot.py tests/test_integration_feedback_bot.py -q
          npm run test -- --passWithNoTests

  parallel-lanes:
    name: Lane ${{ matrix.lane }}
    runs-on: ubuntu-latest
    needs: [deadline-gate, daily-validate]
    if: ${{ needs.deadline-gate.outputs.can_run == 'true' }}
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        lane:
          - core_architecture_stability
          - ai_intelligence
          - monetization
          - product_ux
          - security_reliability
          - growth_community
    steps:
      - name: Emit lane heartbeat
        run: |
          mkdir -p lane-status
          cat <<EOF > "lane-status/${{ matrix.lane }}.json"
          {
            "lane": "${{ matrix.lane }}",
            "status": "in_progress",
            "validation_state": "green",
            "ship_decision": "pending",
            "updated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

      - name: Upload lane status artifact
        uses: actions/upload-artifact@v4
        with:
          name: lane-status-${{ matrix.lane }}
          path: lane-status/${{ matrix.lane }}.json

  weekly-checkpoint:
    name: Weekly milestone checkpoint
    runs-on: ubuntu-latest
    needs: [deadline-gate, parallel-lanes]
    if: ${{ needs.deadline-gate.outputs.can_run == 'true' && needs.deadline-gate.outputs.is_monday == 'true' }}
    steps:
      - name: Weekly scope rebalance checkpoint
        run: |
          echo "Weekly checkpoint complete at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Review blockers, validation failures, and ship decisions per lane."
