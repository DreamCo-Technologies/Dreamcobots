name: Bot Health Scan

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  scan-missing-files:
    name: Scan bot missing files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run missing files scanner
        run: npm run scan:missing

      - name: Upload bot health reports
        uses: actions/upload-artifact@v4
        with:
          name: bot-health-report
          path: reports/
