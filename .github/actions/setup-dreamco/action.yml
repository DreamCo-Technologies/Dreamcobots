name: "🚀 Setup DreamCo Environment"
description: "Reusable composite action: Python + Node + pip/npm caching for every DreamCoBots workflow"

inputs:
  python-version:
    description: "Python version to install"
    required: false
    default: "3.11"
  node-version:
    description: "Node.js version to install"
    required: false
    default: "20"
  install-python-deps:
    description: "Install pip requirements.txt"
    required: false
    default: "true"
  install-node-deps:
    description: "Install npm dependencies"
    required: false
    default: "false"

outputs:
  python-version:
    description: "Actual Python version installed"
    value: ${{ steps.setup-python.outputs.python-version }}
  node-version:
    description: "Actual Node.js version installed"
    value: ${{ steps.setup-node.outputs.node-version }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip

    - name: Set up Node.js
      id: setup-node
      if: ${{ inputs.install-node-deps == 'true' }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install Python dependencies
      if: ${{ inputs.install-python-deps == 'true' }}
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Node.js dependencies
      if: ${{ inputs.install-node-deps == 'true' }}
      shell: bash
      run: npm ci
