apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dreamco-os-hpa
  namespace: dreamco
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dreamco-os
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: dreamco-os
  namespace: dreamco
  labels:
    app: dreamco-os
spec:
  selector:
    app: dreamco-os
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
