apiVersion: apps/v1
kind: Deployment
metadata:
  name: dreamco-os
  namespace: dreamco
  labels:
    app: dreamco-os
    version: "2.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dreamco-os
  template:
    metadata:
      labels:
        app: dreamco-os
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: dreamco-os
          image: dreamco-os:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dreamco-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: dreamco-secrets
                  key: redis-url
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dreamco-secrets
                  key: openai-api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dreamco-secrets
                  key: anthropic-api-key
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: audit-logs
              mountPath: /var/log/dreamco
            - name: chroma-data
              mountPath: /app/.dreamco_chroma
      volumes:
        - name: audit-logs
          emptyDir: {}
        - name: chroma-data
          persistentVolumeClaim:
            claimName: dreamco-chroma-pvc
