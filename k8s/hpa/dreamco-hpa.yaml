apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dreamco-backend-hpa
  namespace: dreamco
  labels:
    app.kubernetes.io/name: dreamco-backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: dreamco-empire-os
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dreamco-backend
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      selectPolicy: Max
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
---
