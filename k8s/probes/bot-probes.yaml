apiVersion: apps/v1
kind: Deployment
metadata:
  name: dreamco-backend
  namespace: dreamco
  labels:
    app.kubernetes.io/name: dreamco-backend
    app.kubernetes.io/component: api
spec:
  template:
    spec:
      containers:
        - name: backend
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            timeoutSeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /startup
              port: 8000
            timeoutSeconds: 3
            periodSeconds: 5
            failureThreshold: 24
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dreamco-worker
  namespace: dreamco
  labels:
    app.kubernetes.io/name: dreamco-worker
    app.kubernetes.io/component: worker
spec:
  template:
    spec:
      containers:
        - name: worker
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 8
            timeoutSeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /startup
              port: 8000
            timeoutSeconds: 3
            periodSeconds: 5
            failureThreshold: 30
