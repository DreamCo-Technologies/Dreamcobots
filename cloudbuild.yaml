steps:
  # ── Step 1: Build the Docker image ──────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/dreamco-empire-os:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/dreamco-empire-os:latest'
      - '.'

  # ── Step 2: Push to Container Registry ──────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args:
      - push
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/dreamco-empire-os'
    waitFor: ['build']

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-cloudrun
    entrypoint: gcloud
    args:
      - run
      - deploy
      - dreamco-empire-os
      - '--image=gcr.io/$PROJECT_ID/dreamco-empire-os:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
    waitFor: ['push']

  # ── Step 4: Deploy to App Engine ────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-appengine
    entrypoint: gcloud
    args:
      - app
      - deploy
      - app.yaml
      - '--project=$PROJECT_ID'
      - '--quiet'
      - '--promote'
    waitFor: ['build']

  # ── Step 5: Deploy to Firebase Hosting ──────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-firebase
    entrypoint: bash
    args:
      - '-c'
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --token "$$FIREBASE_TOKEN" --non-interactive
    secretEnv: ['FIREBASE_TOKEN']
    waitFor: ['build']

images:
  - 'gcr.io/$PROJECT_ID/dreamco-empire-os:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/dreamco-empire-os:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_TOKEN/versions/latest
      env: 'FIREBASE_TOKEN'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '900s'
