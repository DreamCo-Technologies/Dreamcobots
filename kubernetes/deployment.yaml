apiVersion: apps/v1
kind: Deployment
metadata:
  name: dreamco-control-tower
  labels:
    app: dreamco-control-tower
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dreamco-control-tower
  template:
    metadata:
      labels:
        app: dreamco-control-tower
    spec:
      containers:
        - name: control-tower
          image: ghcr.io/dreamco-technologies/dreamcobots/control-tower:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
