name: Bot Deployment
on:
  push:
    branches: [main]
    paths:
      - 'bots/**'
      - 'config/**'
      - 'k8s/**'
jobs:
  validate-bots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: python tools/check_bot_framework.py
      - run: python tools/compile_bot_registry.py --check
  build-docker:
    runs-on: ubuntu-latest
    needs: validate-bots
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v2
      - uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: dreamcobots:latest
  health-check:
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - run: echo '✓ Bot deployment pipeline complete'