name: Repair Bot Metadata PR

on:
  workflow_dispatch:

jobs:
  repair-bot-metadata:
    name: Generate missing bot metadata files
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate missing bot README, manifest, and control files
        run: npm run repair:bot-metadata:apply

      - name: Re-run missing file scan
        run: npm run scan:missing

      - name: Create repair pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/repair-bot-metadata
          title: Repair missing DreamCo bot metadata files
          commit-message: Repair missing DreamCo bot metadata files
          body: |
            This automated PR generates missing `README.md`, `bot.manifest.json`, and `bot.control.json` files for bot folders.

            It also refreshes bot health reports so the next repair pass can focus on imports, runnable examples, tests, and deeper dependency issues.
          labels: bot-health, automation, metadata
          add-paths: |
            bots/**/README.md
            bots/**/bot.manifest.json
            bots/**/bot.control.json
            reports/bot-metadata-repair-plan.json
            reports/bot-health-report.json
            reports/bot-health-report.md
