name: "🔥 Chaos Testing — Resilience Engineering"

on:
  schedule:
    # Weekly chaos drill — Sunday 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      intensity:
        description: "Chaos intensity: low | medium | high"
        required: false
        default: "low"
        type: choice
        options: ["low", "medium", "high"]
      target:
        description: "Target subsystem: all | revenue | learning | swarm | registry"
        required: false
        default: "all"
        type: choice
        options: ["all", "revenue", "learning", "swarm", "registry"]

concurrency:
  group: chaos-testing
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  chaos-drill:
    name: "🔥 Chaos Drill (${{ inputs.intensity || 'low' }}) — ${{ inputs.target || 'all' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run chaos scenarios
        id: chaos
        shell: python
        env:
          CHAOS_INTENSITY: ${{ inputs.intensity || 'low' }}
          CHAOS_TARGET: ${{ inputs.target || 'all' }}
        run: |
          import os, sys, json, random, datetime, traceback
          sys.path.insert(0, ".")

          intensity = os.environ.get("CHAOS_INTENSITY","low")
          target    = os.environ.get("CHAOS_TARGET","all")

          SCENARIOS = {
              "registry": [
                  "duplicate_bot_registration",
                  "invalid_bot_id_format",
                  "health_update_concurrency",
              ],
              "learning": [
                  "corrupt_learning_record",
                  "empty_strategy_extraction",
                  "sqlite_lock_simulation",
              ],
              "swarm": [
                  "pheromone_trace_overflow",
                  "governance_policy_miss",
                  "replay_invalid_sequence",
              ],
              "revenue": [
                  "formula_vault_missing_strategy",
                  "sandbox_timeout_simulation",
              ],
          }

          subsystems = list(SCENARIOS.keys()) if target == "all" else [target]
          if intensity == "low":
              subsystems = subsystems[:2]
          elif intensity == "medium":
              subsystems = subsystems[:3]

          results = []
          for sub in subsystems:
              for scenario in SCENARIOS.get(sub, []):
                  result = {"subsystem": sub, "scenario": scenario, "status": "skip", "details": ""}
                  try:
                      if sub == "registry":
                          from dreamco_platform.registry.bot_registry import BotRegistry, BotRegistryEntry
                          reg = BotRegistry()
                          if scenario == "duplicate_bot_registration":
                              e = BotRegistryEntry(bot_id="chaos_test_bot", name="Chaos", description="", capabilities=[], tier="free")
                              reg.register(e)
                              try:
                                  reg.register(e)
                                  result["status"] = "WARN — duplicate allowed"
                              except Exception:
                                  result["status"] = "PASS — duplicate rejected ✅"
                          elif scenario == "invalid_bot_id_format":
                              try:
                                  BotRegistryEntry(bot_id="INVALID BOT", name="X", description="", capabilities=[], tier="free")
                                  result["status"] = "FAIL — bad id accepted ❌"
                              except Exception:
                                  result["status"] = "PASS — bad id rejected ✅"
                          else:
                              result["status"] = "PASS (smoke) ✅"
                      elif sub == "learning":
                          from global_learning_system.learning_loop import GlobalLearningLoop
                          loop = GlobalLearningLoop()
                          if scenario == "empty_strategy_extraction":
                              strategies = loop.extract_successful_strategies(limit=0)
                              result["status"] = f"PASS — returned {strategies} ✅"
                          else:
                              result["status"] = "PASS (smoke) ✅"
                      elif sub == "swarm":
                          from dreamco_platform.swarm.stigmergy import PheromoneTrace
                          trace = PheromoneTrace()
                          result["status"] = "PASS (smoke) ✅"
                      else:
                          result["status"] = "PASS (smoke) ✅"
                  except Exception as exc:
                      result["status"] = f"ERROR: {exc}"
                      result["details"] = traceback.format_exc()[-300:]

                  results.append(result)
                  icon = "✅" if "PASS" in result["status"] else ("⚠️" if "WARN" in result["status"] else "❌")
                  print(f"  {icon} [{sub}] {scenario}: {result['status']}")

          passed = sum(1 for r in results if "PASS" in r["status"])
          failed = sum(1 for r in results if "FAIL" in r["status"] or "ERROR" in r["status"])

          with open(os.environ.get("GITHUB_STEP_SUMMARY","/dev/null"),"a") as fh:
              fh.write(f"## 🔥 Chaos Drill Report\n\n")
              fh.write(f"**Intensity:** `{intensity}` | **Target:** `{target}` | ")
              fh.write(f"✅ {passed} passed | ❌ {failed} failed\n\n")
              fh.write("| Subsystem | Scenario | Status |\n|---|---|---|\n")
              for r in results:
                  fh.write(f"| `{r['subsystem']}` | `{r['scenario']}` | {r['status']} |\n")

          if failed > 0:
              print(f"::warning::{failed} chaos scenario(s) exposed weaknesses — review summary for details")

          output = os.environ.get("GITHUB_OUTPUT","")
          if output:
              with open(output,"a") as fh:
                  fh.write(f"passed={passed}\nfailed={failed}\n")
