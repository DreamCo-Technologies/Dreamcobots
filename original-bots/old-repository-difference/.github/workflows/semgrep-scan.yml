name: Semgrep Security Scan

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/secrets
            p/python
            p/typescript
          generateSarif: '1'
      - name: Fail on HIGH severity findings
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          sarif = Path('semgrep.sarif')
          if not sarif.exists():
              raise SystemExit(0)
          data = json.loads(sarif.read_text())
          for run in data.get('runs', []):
              for result in run.get('results', []):
                  level = result.get('level', '').lower()
                  if level in {'error', 'high'}:
                      raise SystemExit('HIGH severity Semgrep finding detected')
          PY
      - name: Run Bandit from repo-validation
        run: |
          if [ -f repo-validation.yml ]; then echo 'Bandit integrated via repo-validation.yml'; fi
