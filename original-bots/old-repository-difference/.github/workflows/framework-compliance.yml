name: 🛡️ Framework Compliance

on:
  pull_request:
    paths:
      - "**"

jobs:
  validate:
    name: Validate Bot Framework Compliance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --quiet pytest-split

      - name: Run Static Analysis (GlobalAISourcesFlow compliance)
        run: python tools/check_bot_framework.py

      - name: Run Tests (shard ${{ matrix.group }}/4)
        run: |
          python -m pytest tests/ -v \
            --splits 4 --group ${{ matrix.group }} \
            --splitting-algorithm least_duration \
            || python -m pytest tests/ -v \
               --splits 4 --group ${{ matrix.group }}
