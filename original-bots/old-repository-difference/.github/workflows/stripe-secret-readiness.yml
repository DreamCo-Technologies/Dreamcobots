name: Stripe Secret Readiness

on:
  workflow_dispatch:
    inputs:
      stripe_profile:
        description: Stripe profile/account label for future rotations
        required: true
        default: default
      live_sync:
        description: Type APPROVE to allow future live Stripe sync steps
        required: true
        default: DRY_RUN

permissions:
  contents: read

jobs:
  stripe-readiness:
    runs-on: ubuntu-latest
    env:
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || secrets.STRIPE_API_KEY }}
      STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY || secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
      PAYMENT_ALERT_EMAILS: ${{ secrets.PAYMENT_ALERT_EMAILS || secrets.STRIPE_PAYMENT_ALERT_EMAILS }}
      STRIPE_PAYMENT_ALERT_EMAILS: ${{ secrets.STRIPE_PAYMENT_ALERT_EMAILS || secrets.PAYMENT_ALERT_EMAILS }}
      PAYMENT_EMAIL_PROVIDER: ${{ secrets.PAYMENT_EMAIL_PROVIDER }}
      PAYMENT_EMAIL_FROM: ${{ secrets.PAYMENT_EMAIL_FROM }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      PAYMENT_GITHUB_NOTIFICATIONS: ${{ vars.PAYMENT_GITHUB_NOTIFICATIONS || 'false' }}
      PAYMENT_GITHUB_REPOSITORY: ${{ github.repository }}
      PAYMENT_GITHUB_TOKEN: ${{ secrets.PAYMENT_GITHUB_TOKEN }}
      STRIPE_PROFILE: ${{ github.event.inputs.stripe_profile }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Confirm Stripe secret names without printing values
        run: |
          python3 - <<'PY'
          import os
          required = [
              "STRIPE_SECRET_KEY",
              "STRIPE_WEBHOOK_SECRET",
              "STRIPE_PUBLISHABLE_KEY",
          ]
          optional = [
              "PAYMENT_ALERT_EMAILS",
              "PAYMENT_EMAIL_PROVIDER",
              "PAYMENT_EMAIL_FROM",
              "RESEND_API_KEY",
              "PAYMENT_GITHUB_TOKEN",
          ]
          for name in required:
              print(f"{name}_configured={bool(os.environ.get(name))}")
          for name in optional:
              print(f"{name}_configured={bool(os.environ.get(name))}")
          PY

      - name: Build future Stripe profile packet
        run: |
          python3 - <<'PY'
          import json
          import os
          from bots.stripe_builder_bot import StripeBuilderBot

          profile = os.environ.get("STRIPE_PROFILE", "default")
          bot = StripeBuilderBot()
          packet = bot.build_secret_profile_packet(profile)
          safe_packet = {
              "profile": packet["profile"],
              "status": packet["status"],
              "secret_values_included": packet["secret_values_included"],
              "profile_secret_names": packet["profile_secret_names"],
              "approval_required_before": packet["approval_required_before"],
          }
          print(json.dumps(safe_packet, indent=2, sort_keys=True))
          PY

      - name: Run Stripe price audit
        run: python3 tools/generate_stripe_price_audit.py --check

      - name: Run Stripe revenue rescue with GitHub secrets
        run: python3 tools/stripe_revenue_rescue.py

      - name: Keep live sync blocked unless approved
        if: ${{ github.event.inputs.live_sync != 'APPROVE' }}
        run: |
          echo "Dry run complete. Live Stripe product/price/payment-link sync remains blocked."

      - name: Upload Stripe readiness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stripe-secret-readiness
          path: |
            reports/stripe_revenue_rescue_report.json
            reports/STRIPE_REVENUE_RESCUE_REPORT.md
            reports/stripe_price_audit.json
            reports/STRIPE_PRICE_AUDIT.md
            data/stripe/repository-price-map.json
            data/stripe/offers.generated.json
